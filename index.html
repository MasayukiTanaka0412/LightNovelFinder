    <style>
      :root {

      body {

        background: var(--bg);

      .no { background: #e7ebf5; color: var(--text); }
      .restart { margin-top: 18px; background: var(--accent-weak); color: #2d46b6; }
      .result {
        margin-top: 14px;
        border-radius: 12px;

  <body>
    <main class="app">
      <h1>10問でわかる！ライトノベル100選おすすめ診断</h1>
      <p class="lead">
        Yes/Noで10問に答えると、「このライトノベルがすごい！」掲載・受賞常連作を中心にした
        100作品データからあなた向けのおすすめを提案します。
      </p>

      <div id="quizArea">
        <p class="progress" id="progress"></p>
        <section class="question">
          <h2 id="questionText"></h2>
          <div class="actions">
            <button class="yes" id="yesBtn" type="button">Yes</button>
            <button class="no" id="noBtn" type="button">No</button>
          </div>
        </section>
      </div>

      <section class="result" id="resultArea" hidden>
        <h3 id="title"></h3>
        <p id="reason"></p>
        <ul id="topList"></ul>
        <p class="footnote" id="meta"></p>
        <button class="restart" id="restartBtn" type="button">もう一度診断する</button>
      </section>
    </main>

    <script>

        { text: "頭脳戦・心理戦が多い作品を読みたいですか？", key: "mind" },
        { text: "シリアスで重厚な展開でも楽しめますか？", key: "dark" },
        { text: "笑えるコメディ要素は重要ですか？", key: "comedy" },
        { text: "長編シリーズ（10巻以上）でもOKですか？", key: "long" },

        { title: "エロマンガ先生", tags: ["comedy", "romance", "warm"] },

        { title: "ゴブリンスレイヤー", tags: ["dark", "isekai", "long"] },

        { title: "落第騎士の英雄譚", tags: ["school", "romance", "rise"] },
        { title: "ハイスクールD×D", tags: ["school", "romance", "comedy", "long"] },
        { title: "デート・ア・ライブ", tags: ["school", "romance", "comedy", "long"] },
        { title: "六花の勇者", tags: ["mystery", "dark", "isekai"] },
        { title: "人類は衰退しました", tags: ["comedy", "mystery", "dark"] },
        { title: "安達としまむら", tags: ["school", "romance", "warm"] },
        { title: "わたし、能力は平均値でって言ったよね！", tags: ["isekai", "comedy", "warm"] },
        { title: "スパイ教室", tags: ["mystery", "mind", "school"] },
        { title: "境界線上のホライゾン", tags: ["school", "dark", "long"] },
        { title: "終末なにしてますか？忙しいですか？救ってもらっていいですか？", tags: ["dark", "romance", "warm"] },
        { title: "君死にたもう流星群", tags: ["dark", "mystery"] },
        { title: "半分の月がのぼる空", tags: ["romance", "warm", "dark"] },
        { title: "とらドラ！", tags: ["school", "romance", "comedy", "warm"] },
        { title: "境界の彼方", tags: ["school", "romance", "dark"] },
        { title: "小説 君の名は。", tags: ["romance", "mystery", "warm"] },
        { title: "小説 天気の子", tags: ["romance", "mystery", "warm"] },
        { title: "小説 すずめの戸締まり", tags: ["romance", "mystery", "warm"] },
        { title: "異世界食堂", tags: ["isekai", "warm", "comedy"] },
        { title: "異世界居酒屋「のぶ」", tags: ["isekai", "warm", "comedy"] },
        { title: "マリア様がみてる", tags: ["school", "romance", "warm", "long"] },
        { title: "彩雲国物語", tags: ["rise", "romance", "warm", "long"] },
        { title: "十二国記", tags: ["isekai", "dark", "rise", "long"] },
        { title: "デルフィニア戦記", tags: ["isekai", "romance", "long"] },
        { title: "ロードス島戦記", tags: ["isekai", "dark", "long"] },
        { title: "ブギーポップシリーズ", tags: ["mystery", "dark", "school", "long"] },
        { title: "Missing", tags: ["school", "mystery", "dark"] },
        { title: "ムシウタ", tags: ["school", "dark", "mystery", "long"] },
        { title: "レンタルマギカ", tags: ["mystery", "comedy", "long"] },
        { title: "レジンキャストミルク", tags: ["school", "dark", "mystery"] },
        { title: "東京レイヴンズ", tags: ["school", "dark", "mystery", "romance"] },
        { title: "伝説の勇者の伝説", tags: ["isekai", "dark", "comedy", "long"] },
        { title: "いつか天魔の黒ウサギ", tags: ["school", "dark", "romance"] },
        { title: "天久鷹央の推理カルテ", tags: ["mystery", "mind", "warm"] },
        { title: "誰が勇者を殺したか", tags: ["mystery", "dark", "isekai"] }
      ];

      const state = { index: 0, answers: {} };

      const progress = document.getElementById("progress");
      const questionText = document.getElementById("questionText");
      const quizArea = document.getElementById("quizArea");
      const resultArea = document.getElementById("resultArea");
      const title = document.getElementById("title");
      const reason = document.getElementById("reason");
      const topList = document.getElementById("topList");
      const meta = document.getElementById("meta");

      function renderQuestion() {
        const q = questions[state.index];
        progress.textContent = `Q${state.index + 1} / ${questions.length}`;
        questionText.textContent = q.text;
      }

      function answer(value) {
        const key = questions[state.index].key;
        state.answers[key] = value;
        state.index += 1;

        if (state.index < questions.length) {
          renderQuestion();
          return;
        }
        showResult();
      }

      function scoreWork(work) {
        return questions.reduce((score, q) => {
          const hasTag = work.tags.includes(q.key);
          const answerYes = Boolean(state.answers[q.key]);

          if (answerYes && hasTag) return score + 2;
          if (!answerYes && hasTag) return score - 1;
          return score;
        }, 0);
      }

      function showResult() {
        const ranked = works
          .map((work) => ({ ...work, score: scoreWork(work) }))
          .sort((a, b) => b.score - a.score);

        const top = ranked[0];
        const top3 = ranked.slice(0, 3);

        title.innerHTML = `あなたへのおすすめ: ${top.title}<span class="badge">一致度 ${top.score}</span>`;
        reason.textContent = "Yes回答は加点、No回答は減点して、好みに近い順で提案しています。";

        topList.innerHTML = "";
        top3.forEach((work, i) => {
          const li = document.createElement("li");
          li.textContent = `${i + 1}. ${work.title}（一致度 ${work.score}）`;
          topList.appendChild(li);
        });

        meta.textContent = `対象作品数: ${works.length}作 / 参照方針: 「このライトノベルがすごい！」掲載・受賞常連作を中心に100作品で構成`;

        quizArea.hidden = true;
        resultArea.hidden = false;
      }

      function resetQuiz() {
        state.index = 0;
        state.answers = {};
        quizArea.hidden = false;
        resultArea.hidden = true;
        renderQuestion();
      }

      document.getElementById("yesBtn").addEventListener("click", () => answer(true));
      document.getElementById("noBtn").addEventListener("click", () => answer(false));
      document.getElementById("restartBtn").addEventListener("click", resetQuiz);

      renderQuestion();
    </script>
